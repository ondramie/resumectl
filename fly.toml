# fly.toml app configuration file generated for resumectl on 2026-04-17T00:34:51-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'resumectl'
primary_region = 'lax'

[build]

[env]
  PORT = '8080'

[[mounts]]
  source = 'resumectl_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
